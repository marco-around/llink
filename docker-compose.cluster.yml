services:
  cassandra-1:
    image: cassandra:latest
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=llink-cluster
      - CASSANDRA_SEEDS=cassandra-1,cassandra-2,cassandra-3
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
    volumes:
      - cassandra_data_1:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  cassandra-2:
    image: cassandra:latest
    environment:
      - CASSANDRA_CLUSTER_NAME=llink-cluster
      - CASSANDRA_SEEDS=cassandra-1,cassandra-2,cassandra-3
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
    volumes:
      - cassandra_data_2:/var/lib/cassandra
    depends_on:
      cassandra-1:
        condition: service_healthy

  cassandra-3:
    image: cassandra:latest
    environment:
      - CASSANDRA_CLUSTER_NAME=llink-cluster
      - CASSANDRA_SEEDS=cassandra-1,cassandra-2,cassandra-3
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
    volumes:
      - cassandra_data_3:/var/lib/cassandra
    depends_on:
      cassandra-2:
        condition: service_started

  redis-master:
    image: bitnami/redis
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_REPLICATION_MODE=master
    ports:
      - "6379:6379"
    volumes:
      - redis_master_data:/bitnami/redis/data

  redis-replica-1:
    image: bitnami/redis
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_REPLICATION_MODE=slave
      - REDIS_MASTER_HOST=redis-master
    depends_on:
      - redis-master
    volumes:
      - redis_replica_1_data:/bitnami/redis/data

  redis-replica-2:
    image: bitnami/redis
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_REPLICATION_MODE=slave
      - REDIS_MASTER_HOST=redis-master
    depends_on:
      - redis-master
    volumes:
      - redis_replica_2_data:/bitnami/redis/data

  redis-sentinel-1:
    image: bitnami/redis-sentinel
    environment:
      - REDIS_SENTINEL_QUORUM=2
      - REDIS_MASTER_HOST=redis-master
      - ALLOW_EMPTY_PASSWORD=yes
    depends_on:
      - redis-master
    ports:
      - "26379:26379"

  redis-sentinel-2:
    image: bitnami/redis-sentinel
    environment:
      - REDIS_SENTINEL_QUORUM=2
      - REDIS_MASTER_HOST=redis-master
      - ALLOW_EMPTY_PASSWORD=yes
    depends_on:
      - redis-master

  redis-sentinel-3:
    image: bitnami/redis-sentinel
    environment:
      - REDIS_SENTINEL_QUORUM=2
      - REDIS_MASTER_HOST=redis-master
      - ALLOW_EMPTY_PASSWORD=yes
    depends_on:
      - redis-master

volumes:
  cassandra_data_1:
  cassandra_data_2:
  cassandra_data_3:
  redis_master_data:
  redis_replica_1_data:
  redis_replica_2_data:
